{extend name="layout/supplier_base"/}

{block name="content"}
<h1 style="font-size: 20px; font-weight: 600; color: #1d2129; margin-bottom: 20px;">我的订单</h1>

<div style="display: flex; gap: 20px; margin-bottom: 24px;">
    <div class="stat-card blue" style="flex: 1;">
        <div class="label">待确认</div>
        <div class="value">3</div>
    </div>
    <div class="stat-card orange" style="flex: 1;">
        <div class="label">制作中</div>
        <div class="value">5</div>
    </div>
    <div class="stat-card green" style="flex: 1;">
        <div class="label">已完成</div>
        <div class="value">28</div>
    </div>
    <div class="stat-card red" style="flex: 1;">
        <div class="label">已取消</div>
        <div class="value">1</div>
    </div>
</div>

<div class="order-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <div>
            <span style="font-weight: 600; color: #1d2129;">订单 #20250130001</span>
            <span class="status-tag warning" style="margin-left: 12px;">待确认</span>
        </div>
        <div style="color: #86909c; font-size: 14px;">2025-01-30</div>
    </div>
    <div style="color: #4e5969; margin-bottom: 8px;">产品：仿古青铜摆件 x 50</div>
    <div style="display: flex; gap: 12px; margin-top: 12px;">
        <button class="btn btn-primary">确认订单</button>
        <button class="btn btn-danger">拒绝</button>
    </div>
</div>

<div class="order-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <div>
            <span style="font-weight: 600; color: #1d2129;">订单 #20250129005</span>
            <span class="status-tag success" style="margin-left: 12px;">已完成</span>
        </div>
        <div style="color: #86909c; font-size: 14px;">2025-01-29</div>
    </div>
    <div style="color: #4e5969; margin-bottom: 8px;">产品：陶瓷茶具套装 x 100</div>
    <div style="color: #165DFF; font-weight: 600; margin-top: 8px;">订单金额：¥5,800.00</div>
</div>
{/block}

{block name="script"}
<script>
console.log('供应商端首页加载完成');
</script>
{/block}
