{extend name="layout/supplier_base.html"}

{block name="content"}
<div>
    <h2>еҸ‘иҙ§ - жҙҫеҚ• {$dispatch.dispatch_no|default=$dispatch.id}</h2>

    <div style="background:#fff; padding:16px; border-radius:6px;">
        <form id="shipForm">
            <div style="margin-bottom:8px;"><label>жүҝиҝҗе•Ҷпјҡ<input name="carrier" type="text" /></label></div>
            <div style="margin-bottom:8px;"><label>иҝҗеҚ•еҸ·пјҡ<input name="ship_no" type="text" /></label></div>
            <div style="margin-bottom:8px;"><label>еӨҮжіЁпјҡ<textarea name="remark"></textarea></label></div>

            <h4>иҙ§е“ҒзЎ®и®Ө</h4>
            <table style="width:100%; border-collapse:collapse;">
                <thead><tr><th>иҙ§е“Ғ</th><th>и§„ж ј</th><th>и®ўеҚ•ж•°йҮҸ</th><th>еҸ‘иҙ§ж•°йҮҸ</th></tr></thead>
                <tbody>
                {foreach name="$dispatch.items" item="it"}
                    <tr>
                        <td style="padding:8px;">{$it.goods_name}</td>
                        <td style="padding:8px;">{$it.sku_name}</td>
                        <td style="padding:8px;">{$it.quantity}</td>
                        <td style="padding:8px;"><input name="ship_qty_{$it.id}" type="number" value="{$it.quantity}" /></td>
                    </tr>
                {/foreach}
                </tbody>
            </table>

            <div style="margin-top:12px;"><button type="button" onclick="submitShip()">жҸҗдәӨеҸ‘иҙ§</button></div>
        </form>
    </div>
</div>

<script>
function submitShip(){
    const form = document.getElementById('shipForm');
    const data = new URLSearchParams(new FormData(form));
    fetch('/supplier/order/ship/{$dispatch.id}', { method: 'POST', body: data }).then(r=>r.json()).then(j=>{ alert(j.msg||'е®ҢжҲҗ'); if(j.code==200) location.href='/supplier/order/my'; });
}
</script>

{/block}
