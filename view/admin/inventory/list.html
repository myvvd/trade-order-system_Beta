{extend name="layout/admin_base"/}

{block name="content"}
<div id="inventoryListApp">
    <div class="page-header">
        <div class="page-header-title">库存盘点</div>
        <a-space :size="12">
            <a-button type="primary" @click="goCreate">+ 创建盘点单</a-button>
        </a-space>
    </div>

    <!-- 搜索区域 -->
    <a-card style="margin-bottom: 16px;">
        <a-form :model="searchForm" layout="inline">
            <a-form-item label="状态">
                <a-select v-model="searchForm.status" placeholder="全部状态" style="width: 150px;" allow-clear>
                    <a-option value="">全部</a-option>
                    <a-option value="0">进行中</a-option>
                    <a-option value="1">已完成</a-option>
                </a-select>
            </a-form-item>
            <a-form-item>
                <a-button type="primary" @click="handleSearch">搜索</a-button>
                <a-button @click="handleReset" style="margin-left: 8px;">重置</a-button>
            </a-form-item>
        </a-form>
    </a-card>

    <!-- 表格区域 -->
    <a-card>
        <a-table :data="tableData" :pagination="false" :bordered="{cell:true}" :stripe="true" row-key="id">
            <template #columns>
                <a-table-column title="盘点单号" data-index="id" :width="120">
                    <template #cell="{ record }">
                        <a-link @click="viewDetail(record.id)">#{{ record.id }}</a-link>
                    </template>
                </a-table-column>
                <a-table-column title="盘点范围" :width="120">
                    <template #cell="{ record }">
                        <span v-if="record.range === 'all'">全部货品</span>
                        <span v-else-if="record.range === 'goods'">指定货品</span>
                        <span v-else-if="record.range === 'category'">按分类</span>
                        <span v-else>{{ record.range || '-' }}</span>
                    </template>
                </a-table-column>
                <a-table-column title="状态" :width="100" align="center">
                    <template #cell="{ record }">
                        <a-tag v-if="record.status == 0" color="orange">进行中</a-tag>
                        <a-tag v-else color="green">已完成</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="盘点项数" data-index="item_count" :width="100" align="center" />
                <a-table-column title="备注" data-index="remark" :width="200">
                    <template #cell="{ record }">{{ record.remark || '-' }}</template>
                </a-table-column>
                <a-table-column title="创建时间" data-index="create_time" :width="170" />
                <a-table-column title="完成时间" :width="170">
                    <template #cell="{ record }">{{ record.completed_time || '-' }}</template>
                </a-table-column>
                <a-table-column title="操作" :width="220">
                    <template #cell="{ record }">
                        <a-space :size="8">
                            <a-button type="text" size="small" @click="viewDetail(record.id)">查看</a-button>
                            <template v-if="record.status == 0">
                                <a-button type="text" size="small" @click="editInventory(record.id)">录入</a-button>
                                <a-button type="text" size="small" status="success" @click="completeInventory(record)">完成</a-button>
                                <a-button type="text" size="small" status="danger" @click="deleteInventory(record)">删除</a-button>
                            </template>
                        </a-space>
                    </template>
                </a-table-column>
            </template>
        </a-table>

        <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #86909c;">共 {{ total }} 条记录</span>
            <a-pagination v-model:current="currentPage" v-model:page-size="pageSize" :total="total" @change="handlePageChange" />
        </div>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
// 从控制器传递的数据
const __LIST__ = {$list_json|raw};
const __TOTAL__ = {$total};
const __CURRENT_PAGE__ = {$page};

const { ref, reactive } = Vue;

window.createPageApp({
    setup() {
        const searchForm = reactive({
            status: ''
        });

        const tableData = ref(__LIST__);
        const total = ref(__TOTAL__);
        const currentPage = ref(__CURRENT_PAGE__);
        const pageSize = ref(15);

        const handleSearch = () => {
            const params = [];
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            let url = '/admin/inventory/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const handleReset = () => {
            searchForm.status = '';
            handleSearch();
        };

        const handlePageChange = (page) => {
            const params = [];
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            params.push('page=' + page);
            let url = '/admin/inventory/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const goCreate = () => { location.href = '/admin/inventory/create'; };
        const viewDetail = (id) => { location.href = '/admin/inventory/detail/' + id; };
        const editInventory = (id) => { location.href = '/admin/inventory/edit/' + id; };

        const completeInventory = (record) => {
            ArcoModal.confirm({
                title: '确认完成盘点',
                content: '确定完成盘点并应用库存变动吗？此操作不可撤销。',
                onOk: () => {
                    fetch('/admin/inventory/complete/' + record.id, { method: 'POST' })
                        .then(r => r.json())
                        .then(ret => {
                            if (ret.code == 200 || ret.success) {
                                ArcoMessage.success(ret.msg || '盘点完成');
                                location.reload();
                            } else {
                                ArcoMessage.error(ret.msg || '操作失败');
                            }
                        });
                }
            });
        };

        const deleteInventory = (record) => {
            ArcoModal.confirm({
                title: '确认删除',
                content: '确定要删除此盘点单吗？',
                onOk: () => {
                    fetch('/admin/inventory/delete/' + record.id, { method: 'POST' })
                        .then(r => r.json())
                        .then(ret => {
                            if (ret.code == 200 || ret.success) {
                                ArcoMessage.success('删除成功');
                                location.reload();
                            } else {
                                ArcoMessage.error(ret.msg || '删除失败');
                            }
                        });
                }
            });
        };

        return {
            searchForm,
            tableData,
            total,
            currentPage,
            pageSize,
            handleSearch,
            handleReset,
            handlePageChange,
            goCreate,
            viewDetail,
            editInventory,
            completeInventory,
            deleteInventory
        };
    }
}, 'inventoryListApp');
</script>
{/block}
