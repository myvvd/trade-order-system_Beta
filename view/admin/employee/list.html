{extend name="layout/admin_base"/}

{block name="content"}
<div id="employeeListApp">
    <div class="page-header">
        <div class="page-header-title">员工管理</div>
        <a-space :size="12">
            <a-button type="primary" @click="goCreate">+ 新增员工</a-button>
        </a-space>
    </div>

    <a-card style="margin-bottom: 16px;">
        <a-form :model="searchForm" layout="inline">
            <a-form-item label="关键词">
                <a-input v-model="searchForm.keyword" placeholder="用户名/姓名/手机/邮箱" style="width: 240px;" allow-clear />
            </a-form-item>
            <a-form-item label="角色">
                <a-select v-model="searchForm.roleId" style="width: 160px;" allow-clear>
                    <a-option :value="0">全部</a-option>
                    <a-option v-for="role in roles" :key="role.id" :value="role.id">{{ role.name }}</a-option>
                </a-select>
            </a-form-item>
            <a-form-item label="状态">
                <a-select v-model="searchForm.status" style="width: 120px;" allow-clear>
                    <a-option value="">全部</a-option>
                    <a-option value="1">正常</a-option>
                    <a-option value="0">禁用</a-option>
                </a-select>
            </a-form-item>
            <a-form-item>
                <a-button type="primary" @click="handleSearch">搜索</a-button>
                <a-button @click="handleReset" style="margin-left: 8px;">重置</a-button>
            </a-form-item>
        </a-form>
    </a-card>

    <a-card>
        <a-table :data="tableData" :pagination="false" :bordered="{cell:true}" :stripe="true" row-key="id">
            <template #columns>
                <a-table-column title="用户名" data-index="username" :width="160" />
                <a-table-column title="姓名" data-index="real_name" :width="140" />
                <a-table-column title="角色" :width="140">
                    <template #cell="{ record }">{{ record.role ? record.role.name : '-' }}</template>
                </a-table-column>
                <a-table-column title="手机" data-index="phone" :width="140" />
                <a-table-column title="邮箱" data-index="email" :width="180" />
                <a-table-column title="状态" :width="80" align="center">
                    <template #cell="{ record }">
                        <a-tag v-if="record.status == 1" color="green">正常</a-tag>
                        <a-tag v-else color="red">禁用</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="最后登录" data-index="last_login_time" :width="160" />
                <a-table-column title="操作" :width="220">
                    <template #cell="{ record }">
                        <a-space :size="8">
                            <a-button type="text" size="small" @click="editUser(record.id)">编辑</a-button>
                            <a-button type="text" size="small" @click="resetPassword(record.id)">重置密码</a-button>
                            <a-button type="text" status="danger" size="small" @click="deleteUser(record)">删除</a-button>
                        </a-space>
                    </template>
                </a-table-column>
            </template>
        </a-table>

        <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #86909c;">共 {{ total }} 条记录</span>
            <a-pagination v-model:current="currentPage" v-model:page-size="pageSize" :total="total" @change="handlePageChange" />
        </div>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
// 从控制器传递的数据（使用ThinkPHP模板变量语法）
const __USERS_LIST__ = {$users_list_json|raw};
const __ROLES__ = {$roles_json|raw};
const __TOTAL__ = {$user_total};
const __CURRENT_PAGE__ = {$user_current_page};
const __KEYWORD__ = '{$keyword|addslashes}';
const __ROLE_ID__ = {$roleId};
const __STATUS__ = '{$status|addslashes}';

const { ref, reactive } = Vue;

window.createPageApp({
    setup() {
        const searchForm = reactive({
            keyword: __KEYWORD__,
            roleId: __ROLE_ID__,
            status: __STATUS__
        });

        const tableData = ref(__USERS_LIST__);
        const roles = ref(__ROLES__);
        const total = ref(__TOTAL__);
        const currentPage = ref(__CURRENT_PAGE__);
        const pageSize = ref(15);

        const buildUrl = (page) => {
            const params = [];
            if (searchForm.keyword) params.push('keyword=' + encodeURIComponent(searchForm.keyword));
            if (searchForm.roleId) params.push('role_id=' + searchForm.roleId);
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            if (page) params.push('page=' + page);
            let url = '/admin/employee/list';
            if (params.length) url += '?' + params.join('&');
            return url;
        };

        const handleSearch = () => { location.href = buildUrl(1); };
        const handleReset = () => {
            searchForm.keyword = '';
            searchForm.roleId = 0;
            searchForm.status = '';
            handleSearch();
        };
        const handlePageChange = (page) => { location.href = buildUrl(page); };
        const goCreate = () => { location.href = '/admin/employee/create'; };
        const editUser = (id) => { location.href = '/admin/employee/edit/' + id; };

        const deleteUser = (record) => {
            ArcoModal.confirm({
                title: '提示',
                content: '确定要删除此用户吗？',
                onOk: () => {
                    fetch('/admin/employee/delete/' + record.id, { method: 'POST' })
                        .then(r => r.json())
                        .then(ret => {
                            if (ret.code === 1 || ret.success) {
                                ArcoMessage.success('删除成功');
                                location.reload();
                            } else {
                                ArcoMessage.error(ret.msg || '删除失败');
                            }
                        });
                }
            });
        };

        const resetPassword = (id) => {
            const pwd = prompt('输入新密码：');
            if (!pwd) return;
            fetch('/admin/employee/resetPassword/' + id, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'password=' + encodeURIComponent(pwd)
            }).then(r => r.json()).then(ret => {
                if (ret.code === 1 || ret.success) {
                    ArcoMessage.success('重置成功');
                } else {
                    ArcoMessage.error(ret.msg || '重置失败');
                }
            });
        };

        return {
            searchForm,
            tableData,
            roles,
            total,
            currentPage,
            pageSize,
            handleSearch,
            handleReset,
            handlePageChange,
            goCreate,
            editUser,
            deleteUser,
            resetPassword
        };
    }
}, 'employeeListApp');
</script>
{/block}
