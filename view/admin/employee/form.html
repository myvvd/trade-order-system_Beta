{extend name="layout/admin_base"/}
{php}
$user = isset($user) ? ($user instanceof \think\Model ? $user->toArray() : $user) : null;
$roles = $roles ?? [];
{/php}

{block name="content"}
<div class="page-header"><div class="page-header-title">{$title}</div></div>

<a-card>
    <a-form id="employeeForm">
        <a-form-item label="用户名"><a-input v-model:value="form.username" /></a-form-item>
        <a-form-item label="密码"><a-input v-model:value="form.password" type="password" placeholder="创建时必填，编辑时留空" /></a-form-item>
        <a-form-item label="姓名"><a-input v-model:value="form.real_name" /></a-form-item>

        <a-form-item label="角色">
            <a-select v-model:value="form.role_id">
                <a-option v-for="r in roles" :key="r.id" :value="r.id">{{ r.name }}</a-option>
            </a-select>
        </a-form-item>

        <a-form-item label="手机"><a-input v-model:value="form.phone" /></a-form-item>
        <a-form-item label="邮箱"><a-input v-model:value="form.email" /></a-form-item>

        <a-form-item label="状态">
            <a-select v-model:value="form.status">
                <a-option :value="1">正常</a-option>
                <a-option :value="0">禁用</a-option>
            </a-select>
        </a-form-item>

        <a-form-item>
            <a-button type="primary" @click="handleSubmit">保存</a-button>
            <a-button @click="handleCancel">取消</a-button>
        </a-form-item>
    </a-form>
</a-card>
{/block}

{block name="script"}
<script>
const { createApp, reactive } = Vue;
const app = createApp({
    setup() {
        const form = reactive({
            id: '{$user.id|raw}',
            username: '{$user.username|raw}',
            password: '',
            real_name: '{$user.real_name|raw}',
            role_id: {$user.role_id|raw|default=0},
            phone: '{$user.phone|raw}',
            email: '{$user.email|raw}',
            status: {$user.status|raw|default=1}
        });

        const roles = {$roles_json|raw|json_encode|default='[]'};

        const handleSubmit = () => {
            const url = form.id ? '/admin/employee/update/' + form.id : '/admin/employee/save';
            const body = new URLSearchParams(); for (const k in form) body.append(k, form[k]);
            fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body.toString() }).then(r=>r.json()).then(ret=>{ if(ret.success){ ArcoMessage.success(ret.msg||'保存成功'); location.href='/admin/employee/list'; } else { ArcoMessage.error(ret.msg||'保存失败'); } });
        };
        const handleCancel = () => { history.back(); };
        return { form, roles, handleSubmit, handleCancel };
    }
});
const container = document.createElement('div'); document.getElementById('app')?.appendChild(container); app.mount(container);
</script>
{/block}
