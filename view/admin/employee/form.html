{extend name="layout/admin_base"/}

{block name="content"}
<div id="employeeFormApp">
    <div class="page-header">
        <div class="page-header-title">{$title}</div>
        <div>
            <a-button @click="handleCancel">返回</a-button>
        </div>
    </div>

    <a-card>
        <a-form :model="form" layout="vertical">
            <a-row :gutter="24">
                <a-col :span="12">
                    <a-form-item label="用户名" required>
                        <a-input v-model="form.username" placeholder="请输入用户名" />
                    </a-form-item>
                </a-col>
                <a-col :span="12">
                    <a-form-item label="密码" :required="!form.id">
                        <a-input v-model="form.password" type="password" :placeholder="form.id ? '留空则不修改' : '请输入密码'" />
                    </a-form-item>
                </a-col>
            </a-row>
            <a-row :gutter="24">
                <a-col :span="12">
                    <a-form-item label="姓名" required>
                        <a-input v-model="form.real_name" placeholder="请输入姓名" />
                    </a-form-item>
                </a-col>
                <a-col :span="12">
                    <a-form-item label="角色">
                        <a-select v-model="form.role_id" placeholder="请选择角色">
                            <a-option v-for="r in roles" :key="r.id" :value="r.id">{{ r.name }}</a-option>
                        </a-select>
                    </a-form-item>
                </a-col>
            </a-row>
            <a-row :gutter="24">
                <a-col :span="12">
                    <a-form-item label="手机">
                        <a-input v-model="form.phone" placeholder="请输入手机号" />
                    </a-form-item>
                </a-col>
                <a-col :span="12">
                    <a-form-item label="邮箱">
                        <a-input v-model="form.email" placeholder="请输入邮箱" />
                    </a-form-item>
                </a-col>
            </a-row>
            <a-form-item label="状态">
                <a-select v-model="form.status">
                    <a-option :value="1">正常</a-option>
                    <a-option :value="0">禁用</a-option>
                </a-select>
            </a-form-item>
            <a-form-item>
                <a-space>
                    <a-button type="primary" @click="handleSubmit" :loading="loading">保存</a-button>
                    <a-button @click="handleCancel">取消</a-button>
                </a-space>
            </a-form-item>
        </a-form>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
// 安全地获取PHP传递的数据
let userData = null;
let rolesData = [];

{if $user}
try {
    userData = {$user|json_encode|raw};
} catch(e) {
    console.error('User data error:', e);
}
{/if}

{if $roles_json}
try {
    rolesData = {$roles_json|raw};
} catch(e) {
    console.error('Roles data error:', e);
}
{/if}

const { ref, reactive } = Vue;

window.createPageApp({
    setup() {
        const loading = ref(false);
        
        const form = reactive({
            id: userData && userData.id ? userData.id : null,
            username: userData && userData.username ? userData.username : '',
            password: '',
            real_name: userData && userData.real_name ? userData.real_name : '',
            role_id: userData && userData.role_id !== undefined ? userData.role_id : null,
            phone: userData && userData.phone ? userData.phone : '',
            email: userData && userData.email ? userData.email : '',
            status: userData && userData.status !== undefined ? userData.status : 1
        });

        const roles = ref(rolesData || []);

        const handleSubmit = async () => {
            if (!form.username || !form.real_name) {
                ArcoMessage.warning('请填写必填项');
                return;
            }
            if (!form.id && !form.password) {
                ArcoMessage.warning('新建员工时密码为必填项');
                return;
            }

            loading.value = true;
            try {
                const url = form.id ? '/admin/employee/update/' + form.id : '/admin/employee/save';
                const body = new URLSearchParams();
                for (const k in form) {
                    if (form[k] !== null && form[k] !== undefined && form[k] !== '') {
                        body.append(k, form[k]);
                    }
                }
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString()
                });
                
                const ret = await response.json();
                if (ret.success || ret.code === 1) {
                    ArcoMessage.success(ret.msg || '保存成功');
                    location.href = '/admin/employee/list';
                } else {
                    ArcoMessage.error(ret.msg || '保存失败');
                }
            } catch (error) {
                ArcoMessage.error('网络错误');
                console.error(error);
            } finally {
                loading.value = false;
            }
        };

        const handleCancel = () => {
            location.href = '/admin/employee/list';
        };

        return {
            form,
            roles,
            loading,
            handleSubmit,
            handleCancel
        };
    }
}, 'employeeFormApp');
</script>
{/block}
