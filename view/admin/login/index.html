<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 外贸订单管理系统</title>

    <!-- Arco Design CSS -->
    <link rel="stylesheet" href="/static/libs/arco/arco-vue.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        .login-container {
            width: 400px;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 24px;
            color: #1d2129;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #86909c;
            font-size: 14px;
        }
        .login-form .form-item {
            margin-bottom: 20px;
        }
        .login-form .form-item label {
            display: block;
            margin-bottom: 8px;
            color: #4e5969;
            font-size: 14px;
        }
        .login-form .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e5e6eb;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .login-form .form-input:focus {
            border-color: #165DFF;
            outline: none;
        }
        .login-btn {
            width: 100%;
            height: 44px;
            background: #165DFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: #0e42d2;
        }
        .login-btn:disabled {
            background: #c9cdd4;
            cursor: not-allowed;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #86909c;
            font-size: 13px;
        }
        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .message.success {
            background: #e8ffea;
            color: #00b42a;
        }
        .message.error {
            background: #ffece8;
            color: #f53f3f;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-container">
        <div class="login-header">
            <h1>外贸订单管理系统</h1>
            <p>Trade Order Management System</p>
        </div>

        <!-- 提示信息 -->
        <div v-if="message" :class="['message', messageType]">
            {{ message }}
        </div>

        <form class="login-form" @submit.prevent="handleLogin">
            <div class="form-item">
                <label>用户名</label>
                <input type="text" class="form-input" v-model="form.username" placeholder="请输入用户名" autocomplete="username">
            </div>

            <div class="form-item">
                <label>密码</label>
                <input type="password" class="form-input" v-model="form.password" placeholder="请输入密码" autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" :disabled="loading">
                {{ loading ? '登录中...' : '登录' }}
            </button>
        </form>

        <div class="login-footer">
            <p>默认账号：admin / admin123</p>
        </div>
    </div>
</div>

<!-- Vue 3 -->
<script src="/static/libs/vue/vue.global.prod.js"></script>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
    setup() {
        const loading = ref(false);
        const message = ref('');
        const messageType = ref('');
        const form = reactive({
            username: '',
            password: ''
        });

        // 显示消息
        const showMessage = (msg, type = 'success') => {
            message.value = msg;
            messageType.value = type;
            setTimeout(() => {
                message.value = '';
            }, 3000);
        };

        // 处理登录
        const handleLogin = async () => {
            if (loading.value) return;

            if (!form.username) {
                showMessage('请输入用户名', 'error');
                return;
            }
            if (!form.password) {
                showMessage('请输入密码', 'error');
                return;
            }

            loading.value = true;

            try {
                const formData = new FormData();
                formData.append('username', form.username);
                formData.append('password', form.password);

                const response = await fetch('/admin/login/login', {
                    method: 'POST',
                    body: formData
                });

                // 先检查响应状态
                if (!response.ok) {
                    const text = await response.text();
                    console.error('响应错误:', response.status, text);
                    showMessage('服务器错误: ' + response.status, 'error');
                    return;
                }

                // 尝试解析 JSON
                const text = await response.text();
                console.log('响应内容:', text);

                let result;
                try {
                    result = JSON.parse(text);
                } catch (e) {
                    console.error('JSON 解析失败:', text);
                    showMessage('服务器返回格式错误', 'error');
                    return;
                }

                if (result.success) {
                    showMessage('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin/index/index';
                    }, 500);
                } else {
                    showMessage(result.msg || '登录失败', 'error');
                }
            } catch (error) {
                console.error('请求错误:', error);
                showMessage('网络错误: ' + error.message, 'error');
            } finally {
                loading.value = false;
            }
        };
        // const handleLogin = async () => {
        //     if (loading.value) return;
        //
        //     // 表单验证
        //     if (!form.username) {
        //         showMessage('请输入用户名', 'error');
        //         return;
        //     }
        //     if (!form.password) {
        //         showMessage('请输入密码', 'error');
        //         return;
        //     }
        //
        //     loading.value = true;
        //
        //     try {
        //         const formData = new FormData();
        //         formData.append('username', form.username);
        //         formData.append('password', form.password);
        //
        //         const response = await fetch('/admin/login/login', {
        //             method: 'POST',
        //             body: formData
        //         });
        //
        //         const result = await response.json();
        //
        //         if (result.success) {
        //             showMessage('登录成功，正在跳转...', 'success');
        //             setTimeout(() => {
        //                 window.location.href = '/admin';
        //             }, 500);
        //         } else {
        //             showMessage(result.msg || '登录失败', 'error');
        //         }
        //     } catch (error) {
        //         showMessage('网络错误，请稍后重试', 'error');
        //     } finally {
        //         loading.value = false;
        //     }
        // };

        // 页面加载时检查提示信息
        onMounted(() => {
            // 检查 URL 参数中的提示
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const success = urlParams.get('success');

            if (success) {
                showMessage(decodeURIComponent(success), 'success');
            } else if (error) {
                showMessage(decodeURIComponent(error), 'error');
            }

            // 回车键登录
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });

        return {
            loading,
            message,
            messageType,
            form,
            handleLogin
        };
    }
}).mount('#app');
</script>
</body>
</html>
