{extend name="layout/admin_base"/}
{php}
$user = isset($user) ? ($user instanceof \think\Model ? $user->toArray() : $user) : [];
{/php}

{block name="content"}
<div class="page-header"><div class="page-header-title">个人设置</div></div>

<a-card>
    <a-form id="profileForm">
        <a-form-item label="姓名"><a-input v-model:value="form.real_name" /></a-form-item>
        <a-form-item label="手机"><a-input v-model:value="form.phone" /></a-form-item>
        <a-form-item label="邮箱"><a-input v-model:value="form.email" /></a-form-item>
        <a-form-item>
            <a-button type="primary" @click="handleUpdate">保存</a-button>
        </a-form-item>
    </a-form>
</a-card>

<a-card style="margin-top:16px;">
    <h3>修改密码</h3>
    <a-form id="pwdForm">
        <a-form-item label="旧密码"><a-input type="password" v-model:value="pwd.old" /></a-form-item>
        <a-form-item label="新密码"><a-input type="password" v-model:value="pwd.new" /></a-form-item>
        <a-form-item>
            <a-button type="primary" @click="handleChangePwd">修改密码</a-button>
        </a-form-item>
    </a-form>
</a-card>

{/block}

{block name="script"}
<script>
const { createApp, reactive } = Vue;
const app = createApp({
    setup(){
        const form = reactive({ real_name: '{$user.real_name|raw}', phone: '{$user.phone|raw}', email: '{$user.email|raw}' });
        const pwd = reactive({ old: '', new: '' });

        const handleUpdate = () => {
            const body = new URLSearchParams(); body.append('real_name', form.real_name); body.append('phone', form.phone); body.append('email', form.email);
            fetch('/admin/profile/update', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body.toString() }).then(r=>r.json()).then(ret=>{ if(ret.success) ArcoMessage.success(ret.msg||'保存成功'); else ArcoMessage.error(ret.msg||'保存失败'); });
        };

        const handleChangePwd = () => {
            const body = new URLSearchParams(); body.append('old_password', pwd.old); body.append('new_password', pwd.new);
            fetch('/admin/profile/password', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body.toString() }).then(r=>r.json()).then(ret=>{ if(ret.success) ArcoMessage.success(ret.msg||'修改成功'); else ArcoMessage.error(ret.msg||'修改失败'); });
        };

        return { form, pwd, handleUpdate, handleChangePwd };
    }
});
const container = document.createElement('div'); document.getElementById('app')?.appendChild(container); app.mount(container);
</script>
{/block}
