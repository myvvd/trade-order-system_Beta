{extend name="layout/admin_base"/}

{block name="content"}
<div id="roleListApp">
    <div class="page-header">
        <div class="page-header-title">角色权限</div>
        <a-space :size="12">
            <a-button type="primary" @click="goCreate">+ 新增角色</a-button>
        </a-space>
    </div>

    <!-- 搜索区域 -->
    <a-card style="margin-bottom: 16px;">
        <a-form :model="searchForm" layout="inline">
            <a-form-item label="角色名称">
                <a-input v-model="searchForm.keyword" placeholder="搜索角色名称" style="width: 200px;" allow-clear />
            </a-form-item>
            <a-form-item label="状态">
                <a-select v-model="searchForm.status" placeholder="全部状态" style="width: 120px;" allow-clear>
                    <a-option value="">全部</a-option>
                    <a-option value="1">正常</a-option>
                    <a-option value="0">禁用</a-option>
                </a-select>
            </a-form-item>
            <a-form-item>
                <a-button type="primary" @click="handleSearch">搜索</a-button>
                <a-button @click="handleReset" style="margin-left: 8px;">重置</a-button>
            </a-form-item>
        </a-form>
    </a-card>

    <!-- 表格区域 -->
    <a-card>
        <a-table :data="tableData" :pagination="false" :bordered="{cell:true}" :stripe="true" row-key="id">
            <template #columns>
                <a-table-column title="ID" data-index="id" :width="80" />
                <a-table-column title="角色名称" :width="200">
                    <template #cell="{ record }">
                        <span style="font-weight: 600;">{{ record.name }}</span>
                        <a-tag v-if="record.id == 1" color="arcoblue" style="margin-left: 8px;">超级管理员</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="描述" data-index="description" :width="250">
                    <template #cell="{ record }">
                        <span style="color: #86909c;">{{ record.description || '-' }}</span>
                    </template>
                </a-table-column>
                <a-table-column title="用户数" data-index="user_count" :width="100" align="center" />
                <a-table-column title="状态" :width="100" align="center">
                    <template #cell="{ record }">
                        <a-tag v-if="record.status == 1" color="green">正常</a-tag>
                        <a-tag v-else color="red">禁用</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="创建时间" data-index="create_time" :width="170" />
                <a-table-column title="操作" :width="200">
                    <template #cell="{ record }">
                        <a-space :size="8">
                            <a-button type="text" size="small" @click="editRole(record.id)">编辑</a-button>
                            <template v-if="record.id != 1">
                                <a-button type="text" size="small" @click="toggleStatus(record)">
                                    {{ record.status == 1 ? '禁用' : '启用' }}
                                </a-button>
                                <a-button type="text" status="danger" size="small" @click="deleteRole(record)">删除</a-button>
                            </template>
                        </a-space>
                    </template>
                </a-table-column>
            </template>
        </a-table>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
// 从控制器传递的数据
const __ROLES__ = {$roles_json|raw};
const __KEYWORD__ = '{$keyword|addslashes}';
const __STATUS__ = '{$status|addslashes}';

const { ref, reactive } = Vue;

window.createPageApp({
    setup() {
        const searchForm = reactive({
            keyword: __KEYWORD__,
            status: __STATUS__
        });

        const tableData = ref(__ROLES__);

        const handleSearch = () => {
            const params = [];
            if (searchForm.keyword) params.push('keyword=' + encodeURIComponent(searchForm.keyword));
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            let url = '/admin/role/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const handleReset = () => {
            searchForm.keyword = '';
            searchForm.status = '';
            location.href = '/admin/role/list';
        };

        const goCreate = () => { location.href = '/admin/role/form'; };
        const editRole = (id) => { location.href = '/admin/role/form?id=' + id; };

        const toggleStatus = (record) => {
            const action = record.status == 1 ? '禁用' : '启用';
            ArcoModal.confirm({
                title: '提示',
                content: '确定要' + action + '此角色吗？',
                onOk: () => {
                    fetch('/admin/role/toggleStatus', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'id=' + record.id
                    }).then(r => r.json()).then(ret => {
                        if (ret.success || ret.code == 1) {
                            ArcoMessage.success(ret.msg || '操作成功');
                            location.reload();
                        } else {
                            ArcoMessage.error(ret.msg || '操作失败');
                        }
                    });
                }
            });
        };

        const deleteRole = (record) => {
            ArcoModal.confirm({
                title: '提示',
                content: '确定要删除此角色吗？',
                onOk: () => {
                    fetch('/admin/role/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'id=' + record.id
                    }).then(r => r.json()).then(ret => {
                        if (ret.success || ret.code == 1) {
                            ArcoMessage.success('删除成功');
                            location.reload();
                        } else {
                            ArcoMessage.error(ret.msg || '删除失败');
                        }
                    });
                }
            });
        };

        return {
            searchForm,
            tableData,
            handleSearch,
            handleReset,
            goCreate,
            editRole,
            toggleStatus,
            deleteRole
        };
    }
}, 'roleListApp');
</script>
{/block}
