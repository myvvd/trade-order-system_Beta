<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>收货确认</title>
    <link rel="stylesheet" href="/static/libs/arco/arco-vue.min.css">
    <style>.error{color:#c00}</style>
</head>
<body>
<div id="app">
    <div style="max-width:1000px;margin:20px auto;">
        <a-card>
            <h3>派单收货 - <?php echo $dispatch->dispatch_no ?? $dispatch->id; ?></h3>
            <p>订单号：<?php echo $dispatch->order->order_no ?? '-'; ?></p>
            <p>供应商：<?php echo $dispatch->supplier->name ?? '-'; ?></p>

            <h4>货品明细</h4>
            <table style="width:100%; border-collapse:collapse;">
                <thead><tr><th>货品</th><th>规格</th><th>派单数量</th><th>发货数量</th><th>实际收货</th></tr></thead>
                <tbody>
                <?php foreach($dispatch->items as $it): ?>
                    <tr>
                        <td style="padding:8px; border-bottom:1px solid #eee"><?php echo $it->goods_name; ?></td>
                        <td style="padding:8px; border-bottom:1px solid #eee"><?php echo $it->sku_name; ?></td>
                        <td style="padding:8px; border-bottom:1px solid #eee"><?php echo $it->quantity; ?></td>
                        <td style="padding:8px; border-bottom:1px solid #eee"><?php echo $it->quantity; ?></td>
                        <td style="padding:8px; border-bottom:1px solid #eee"><input type="number" min="0" name="recv_<?php echo $it->id; ?>" value="<?php echo $it->quantity; ?>" /></td>
                    </tr>
                <?php endforeach; ?>
                </tbody>
            </table>

            <h4 style="margin-top:12px;">质检结果</h4>
            <select id="qc_result">
                <option value="qualified">合格</option>
                <option value="not_qualified">不合格</option>
                <option value="partial">部分合格</option>
            </select>

            <h4 style="margin-top:12px;">备注</h4>
            <textarea id="remark" style="width:100%;height:80px"></textarea>

            <div style="margin-top:12px;">
                <button id="submitBtn">确认收货</button>
                <a href="/admin/order_dispatch/list">返回</a>
            </div>
        </a-card>
    </div>
    </div>

<script>
document.getElementById('submitBtn').addEventListener('click', function(){
    const items = [];
    <?php foreach($dispatch->items as $it): ?>
    items.push({ dispatch_item_id: <?php echo (int)$it->id; ?>, quantity: Number(document.querySelector('input[name="recv_<?php echo $it->id; ?>"]').value || 0) });
    <?php endforeach; ?>
    const payload = { items: items, qc_result: document.getElementById('qc_result').value, remark: document.getElementById('remark').value };
    fetch('/admin/orderdispatch/receive/<?php echo (int)$dispatch->id; ?>', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }).then(r=>r.json()).then(j=>{ if(j.code==200){ alert(j.msg||'收货完成'); location.href='/admin/order_dispatch/list'; } else { alert(j.msg||'收货失败'); }}).catch(()=>{ alert('网络或服务器错误'); });
});
</script>
</body>
</html>
