<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>派单列表</title>
    <link rel="stylesheet" href="https://unpkg.com/@arco-design/web-vue/dist/arco.css">
</head>
<body>
<div id="app">
    <a-card>
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <a-select v-model:value="filter.supplier_id" style="width:200px;">
                    <a-select-option :value="0">全部供应商</a-select-option>
                    <a-select-option v-for="s in suppliers" :key="s.id" :value="s.id">{{ s.name }}</a-select-option>
                </a-select>
                <a-select v-model:value="filter.status" style="width:160px; margin-left:8px;">
                    <a-select-option value="">全部状态</a-select-option>
                    <a-select-option :value="<?php echo \app\model\OrderDispatch::STATUS_WAIT_CONFIRM; ?>">待确认</a-select-option>
                    <a-select-option :value="<?php echo \app\model\OrderDispatch::STATUS_IN_PROGRESS; ?>">制作中</a-select-option>
                    <a-select-option :value="<?php echo \app\model\OrderDispatch::STATUS_WAIT_RECEIVE; ?>">待收货</a-select-option>
                    <a-select-option :value="<?php echo \app\model\OrderDispatch::STATUS_RECEIVED; ?>">已收货</a-select-option>
                </a-select>
                <a-button type="primary" @click="search" style="margin-left:8px;">筛选</a-button>
            </div>
            <div>共 {{ total }} 条</div>
        </div>

        <a-table :data="dispatches" :pagination="false" style="margin-top:12px;">
            <a-table-column title="派单号">
                <template #cell="{ record }">{{ record.id }}</template>
            </a-table-column>
            <a-table-column title="订单号">
                <template #cell="{ record }">{{ record.order.order_no }}</template>
            </a-table-column>
            <a-table-column title="供应商">
                <template #cell="{ record }">{{ record.supplier.name }}</template>
            </a-table-column>
            <a-table-column title="状态">
                <template #cell="{ record }">{{ record.status_text || record.status }}</template>
            </a-table-column>
            <a-table-column title="创建时间">
                <template #cell="{ record }">{{ record.create_time }}</template>
            </a-table-column>
            <a-table-column title="操作" width="200">
                <template #cell="{ record }">
                    <a-button type="text" @click="goDetail(record.id)">详情</a-button>
                </template>
            </a-table-column>
        </a-table>
    </a-card>
</div>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://unpkg.com/@arco-design/web-vue/dist/arco-vue.js"></script>
<script>
const { createApp } = Vue;
createApp({
    data(){
        return {
            dispatches: <?php echo json_encode($dispatches->toArray()['data'] ?? [], JSON_UNESCAPED_UNICODE); ?>,
            suppliers: <?php echo json_encode($suppliers ?? [], JSON_UNESCAPED_UNICODE); ?>,
            filter: { supplier_id: <?php echo (int)($supplier_id ?? 0); ?>, status: '<?php echo $status ?? ''; ?>' },
            total: <?php echo isset($dispatches) ? ($dispatches->total ?? 0) : 0; ?>,
        }
    },
    methods: {
        search(){ const params=new URLSearchParams(); if(this.filter.supplier_id) params.set('supplier_id', this.filter.supplier_id); if(this.filter.status!=='') params.set('status', this.filter.status); window.location.search = params.toString(); },
        goDetail(id){ location.href='/admin/order_dispatch/detail/'+id; }
    }
}).use(window.Arco).mount('#app');
</script>
</body>
</html>
