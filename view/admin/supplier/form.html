{extend name="layout/admin_base"/}
{php}
$supplier = isset($supplier) ? ($supplier instanceof \think\Model ? $supplier->toArray() : $supplier) : null;
$categories = $categories ?? [];
{/php}

{block name="content"}
<div class="page-header"><div class="page-header-title">{$title}</div></div>

<a-card>
    <a-form id="supplierForm">
        <a-form-item label="名称">
            <a-input v-model:value="form.name" />
        </a-form-item>

        <a-form-item label="分类">
            <a-select v-model:value="form.category_id">
                <a-option :value="0">无</a-option>
                <a-option v-for="c in categories" :key="c.id" :value="c.id">{{ c.name }}</a-option>
            </a-select>
        </a-form-item>

        <a-form-item label="联系人"><a-input v-model:value="form.contact" /></a-form-item>
        <a-form-item label="电话"><a-input v-model:value="form.phone" /></a-form-item>
        <a-form-item label="邮箱"><a-input v-model:value="form.email" /></a-form-item>
        <a-form-item label="地址"><a-input v-model:value="form.address" /></a-form-item>

        <a-divider>账号信息</a-divider>
        <a-form-item label="登录账号"><a-input v-model:value="form.login_account" /></a-form-item>
        <a-form-item label="登录密码"><a-input v-model:value="form.login_password" type="password" placeholder="创建时必填，编辑时可留空" /></a-form-item>

        <a-form-item label="状态">
            <a-select v-model:value="form.status">
                <a-option :value="1">正常</a-option>
                <a-option :value="0">禁用</a-option>
            </a-select>
        </a-form-item>

        <a-form-item>
            <a-button type="primary" @click="handleSubmit">保存</a-button>
            <a-button @click="handleCancel">取消</a-button>
        </a-form-item>
    </a-form>
</a-card>
{/block}

{block name="script"}
<script>
const { createApp, reactive } = Vue;
const app = createApp({
    setup() {
        const form = reactive({
            id: '{$supplier.id|raw}',
            name: '{$supplier.name|raw}',
            category_id: {$supplier.category_id|raw|default=0},
            contact: '{$supplier.contact|raw}',
            phone: '{$supplier.phone|raw}',
            email: '{$supplier.email|raw}',
            address: '{$supplier.address|raw}',
            login_account: '{$supplier.login_account|raw}',
            login_password: '',
            status: {$supplier.status|raw|default=1},
            remark: '{$supplier.remark|raw}',
        });

        const categories = {$categories_json|raw|json_encode|default='[]'};

        const handleSubmit = () => {
            const url = form.id ? '/admin/supplier/update/' + form.id : '/admin/supplier/save';
            const body = new URLSearchParams();
            for (const k in form) body.append(k, form[k]);
            fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body.toString() }).then(r=>r.json()).then(ret=>{ if(ret.success){ ArcoMessage.success(ret.msg||'保存成功'); location.href='/admin/supplier/list'; } else { ArcoMessage.error(ret.msg||'保存失败'); } });
        };

        const handleCancel = () => { history.back(); };
        return { form, categories, handleSubmit, handleCancel };
    }
});
const container = document.createElement('div'); document.getElementById('app')?.appendChild(container); app.mount(container);
</script>
{/block}
