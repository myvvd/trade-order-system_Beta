{extend name="layout/admin_base"/}

{block name="content"}
<h1 class="page-title">{$title|default='新增供应商'}</h1>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form id="supplierForm" onsubmit="return saveSupplier(event)">
        
        <!-- 基本信息 -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">供应商名称 <span style="color: #f53f3f;">*</span></label>
            <input type="text" name="name" value="{$supplier.name|default=''}" placeholder="请输入供应商名称" required
                style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">联系人</label>
            <input type="text" name="contact" value="{$supplier.contact|default=''}" placeholder="请输入联系人姓名"
                style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">联系电话</label>
                <input type="text" name="phone" value="{$supplier.phone|default=''}" placeholder="请输入联系电话"
                    style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">邮箱</label>
                <input type="email" name="email" value="{$supplier.email|default=''}" placeholder="请输入邮箱地址"
                    style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">地址</label>
            <textarea name="address" placeholder="请输入详细地址"
                style="width: 100%; height: 80px; padding: 10px 12px; border: 1px solid #e5e6eb; border-radius: 4px; resize: vertical; box-sizing: border-box;">{$supplier.address|default=''}</textarea>
        </div>

        <!-- 账号信息 -->
        <div style="margin: 30px 0 20px 0; padding-bottom: 12px; border-bottom: 1px solid #e5e6eb;">
            <span style="font-size: 15px; font-weight: 600; color: #1d2129;">账号信息</span>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">登录账号 <span style="color: #f53f3f;">*</span></label>
            <input type="text" name="login_account" value="{$supplier.login_account|default=''}" placeholder="请输入登录账号" required
                style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">登录密码 {notempty name="supplier.id"}<span style="color: #86909c; font-size: 12px; font-weight: 400;">（留空则不修改）</span>{else/}<span style="color: #f53f3f;">*</span>{/notempty}</label>
            <input type="password" name="login_password" value="" placeholder="请输入登录密码" {empty name="supplier.id"}required{/empty}
                style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">状态</label>
            <label style="margin-right: 16px;">
                <input type="radio" name="status" value="1" {if condition="($supplier['status'] ?? 1) == 1"}checked{/if}> 正常
            </label>
            <label>
                <input type="radio" name="status" value="0" {if condition="($supplier['status'] ?? 1) == 0"}checked{/if}> 禁用
            </label>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">备注</label>
            <textarea name="remark" placeholder="请输入备注信息"
                style="width: 100%; height: 80px; padding: 10px 12px; border: 1px solid #e5e6eb; border-radius: 4px; resize: vertical; box-sizing: border-box;">{$supplier.remark|default=''}</textarea>
        </div>

        {notempty name="supplier.id"}
        <input type="hidden" name="id" value="{$supplier.id}">
        {/notempty}

        <div style="display: flex; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e6eb;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            <button type="button" class="btn btn-default" onclick="history.back()" style="flex: 1;">取消</button>
        </div>
    </form>
</div>
{/block}

{block name="script"}
<script>
function saveSupplier(event) {
    event.preventDefault();

    const form = document.getElementById('supplierForm');
    const formData = new FormData(form);

    // 根据是否有ID决定是新增还是编辑
    const supplierId = formData.get('id');
    const url = supplierId ? '/admin/supplier/update/' + supplierId : '/admin/supplier/save';

    fetch(url, {
        method: 'POST',
        body: formData
    }).then(res => res.json()).then(result => {
        if (result.success || result.code === 200 || result.code === 1) {
            alert(result.msg || '保存成功');
            location.href = '/admin/supplier/list';
        } else {
            alert(result.msg || '保存失败');
        }
    }).catch(err => {
        console.error('请求出错:', err);
        alert('网络请求失败');
    });
}
</script>
{/block}
