{extend name="layout/admin_base"/}

{block name="content"}
<div id="supplierListApp">
    <div class="page-header">
        <div class="page-header-title">供应商管理</div>
        <a-space :size="12">
            <a-button type="primary" @click="goCreate">+ 新增供应商</a-button>
        </a-space>
    </div>

    <a-card style="margin-bottom: 16px;">
        <a-form :model="searchForm" layout="inline">
            <a-form-item label="关键词">
                <a-input v-model="searchForm.keyword" placeholder="名称/联系人/电话/账号" style="width: 240px;" allow-clear />
            </a-form-item>
            <a-form-item label="状态">
                <a-select v-model="searchForm.status" style="width: 120px;" allow-clear>
                    <a-option value="">全部</a-option>
                    <a-option value="1">正常</a-option>
                    <a-option value="0">禁用</a-option>
                </a-select>
            </a-form-item>
            <a-form-item>
                <a-button type="primary" @click="handleSearch">搜索</a-button>
                <a-button @click="handleReset" style="margin-left: 8px;">重置</a-button>
            </a-form-item>
        </a-form>
    </a-card>

    <a-card>
        <a-table :data="tableData" :pagination="false" :bordered="{cell:true}" :stripe="true" row-key="id">
            <template #columns>
                <a-table-column title="名称" data-index="name" :width="220">
                    <template #cell="{ record }">
                        <a-link @click="viewDetail(record.id)">{{ record.name }}</a-link>
                    </template>
                </a-table-column>
                <a-table-column title="联系人" data-index="contact" :width="140" />
                <a-table-column title="电话" data-index="phone" :width="140" />
                <a-table-column title="登录账号" data-index="login_account" :width="160" />
                <a-table-column title="状态" data-index="status" :width="80" align="center">
                    <template #cell="{ record }">
                        <a-tag v-if="record.status == 1" color="green">正常</a-tag>
                        <a-tag v-else color="red">禁用</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="接单数" data-index="dispatch_count" :width="100" align="center" />
                <a-table-column title="最后登录" data-index="last_login_time" :width="160" />
                <a-table-column title="操作" :width="260">
                    <template #cell="{ record }">
                        <a-space :size="8">
                            <a-button type="text" size="small" @click="editSupplier(record.id)">编辑</a-button>
                            <a-button type="text" size="small" @click="viewDetail(record.id)">详情</a-button>
                            <a-button type="text" size="small" @click="resetPassword(record.id)">重置密码</a-button>
                            <a-button type="text" status="danger" size="small" @click="deleteSupplier(record)">删除</a-button>
                        </a-space>
                    </template>
                </a-table-column>
            </template>
        </a-table>

        <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #86909c;">共 {{ total }} 条记录</span>
            <a-pagination v-model:current="currentPage" v-model:page-size="pageSize" :total="total" @change="handlePageChange" />
        </div>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
// 从控制器传递的数据（使用ThinkPHP模板变量语法）
const __SUPPLIERS_LIST__ = {$suppliers_list_json|raw};
const __TOTAL__ = {$supplier_total};
const __CURRENT_PAGE__ = {$supplier_current_page};
const __KEYWORD__ = '{$keyword|addslashes}';
const __CATEGORY_ID__ = {$categoryId};
const __STATUS__ = '{$status|addslashes}';

const { ref, reactive } = Vue;

window.createPageApp({
    setup() {
        const searchForm = reactive({
            keyword: __KEYWORD__,
            categoryId: __CATEGORY_ID__,
            status: __STATUS__
        });

        const tableData = ref(__SUPPLIERS_LIST__);
        const total = ref(__TOTAL__);
        const currentPage = ref(__CURRENT_PAGE__);
        const pageSize = ref(15);

        const handleSearch = () => {
            const params = [];
            if (searchForm.keyword) params.push('keyword=' + encodeURIComponent(searchForm.keyword));
            if (searchForm.categoryId) params.push('category_id=' + searchForm.categoryId);
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            let url = '/admin/supplier/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const handleReset = () => {
            searchForm.keyword = '';
            searchForm.categoryId = 0;
            searchForm.status = '';
            handleSearch();
        };

        const handlePageChange = (page) => {
            const params = [];
            if (searchForm.keyword) params.push('keyword=' + encodeURIComponent(searchForm.keyword));
            if (searchForm.categoryId) params.push('category_id=' + searchForm.categoryId);
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            params.push('page=' + page);
            let url = '/admin/supplier/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const goCreate = () => { location.href = '/admin/supplier/create'; };
        const editSupplier = (id) => { location.href = '/admin/supplier/edit/' + id; };
        const viewDetail = (id) => { location.href = '/admin/supplier/detail/' + id; };

        const deleteSupplier = (record) => {
            ArcoModal.confirm({
                title: '提示',
                content: '确定要删除此供应商吗？',
                onOk: () => {
                    fetch('/admin/supplier/delete/' + record.id, { method: 'POST' })
                        .then(r => r.json())
                        .then(ret => {
                            if (ret.success || ret.code == 1) {
                                ArcoMessage.success('删除成功');
                                location.reload();
                            } else {
                                ArcoMessage.error(ret.msg || '删除失败');
                            }
                        });
                }
            });
        };

        const resetPassword = (id) => {
            const pwd = prompt('输入新密码：');
            if (!pwd) return;
            fetch('/admin/supplier/resetPassword/' + id, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'login_password=' + encodeURIComponent(pwd)
            }).then(r => r.json()).then(ret => {
                if (ret.success || ret.code == 1) {
                    ArcoMessage.success('重置成功');
                } else {
                    ArcoMessage.error(ret.msg || '重置失败');
                }
            });
        };

        return {
            searchForm,
            tableData,
            total,
            currentPage,
            pageSize,
            handleSearch,
            handleReset,
            handlePageChange,
            goCreate,
            editSupplier,
            viewDetail,
            deleteSupplier,
            resetPassword
        };
    }
}, 'supplierListApp');
</script>
{/block}
