{extend name="layout/admin_base"}

{block name="content"}
<div id="byCustomerApp">
  <a-row gutter="12" style="margin-bottom:12px">
    <a-col :span="12">
      <a-date-picker v-model:value="range[0]" type="date" />
      <a-date-picker v-model:value="range[1]" type="date" style="margin-left:8px" />
      <a-button type="primary" @click="load" style="margin-left:8px">查询</a-button>
      <a-button @click="exportData" style="margin-left:8px">导出</a-button>
    </a-col>
  </a-row>

  <a-row gutter="12">
    <a-col :span="12">
      <a-card>
        <div id="pieChart" style="height:360px"></div>
      </a-card>
    </a-col>
    <a-col :span="12">
      <a-card>
        <a-table :columns="columns" :data="rows" :pagination="{pageSize:10}"/>
      </a-card>
    </a-col>
  </a-row>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/arco-design/dist/arco-vue.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/arco-design/dist/arco.min.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<script>
const { createApp } = Vue;
createApp({
  data(){ return { range:[null,null], rows:[], columns:[{title:'采购方',dataIndex:'customer_name'},{title:'订单数',dataIndex:'cnt'},{title:'订单金额',dataIndex:'amt'},{title:'占比',dataIndex:'amt_percent'}] } },
  mounted(){ this.load(); },
  methods:{
    load(){ const s=this.range[0]||''; const e=this.range[1]||''; fetch('/admin/report/data_by_customer?start='+s+'&end='+e).then(r=>r.json()).then(j=>{ if(j.code==200){ this.rows=j.data; this.renderPie(); } }); },
    renderPie(){ const chart = echarts.init(document.getElementById('pieChart')); chart.setOption({title:{text:'采购方占比'}, tooltip:{}, series:[{type:'pie',radius:'55%',data:this.rows.map(i=>({name:i.customer_name,value:i.amt}))}]}); },
    exportData(){ const s=this.range[0]||''; const e=this.range[1]||''; location.href='/admin/report/export/by_customer?start='+s+'&end='+e; }
  }
}).use(ArcoVue).mount('#byCustomerApp');
</script>

{/block}
