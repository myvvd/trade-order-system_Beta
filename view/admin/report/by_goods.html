{extend name="layout/admin_base"}

{block name="content"}
<div id="byGoodsApp">
  <a-row gutter="12" style="margin-bottom:12px">
    <a-col :span="12">
      <a-date-picker v-model:value="range[0]" type="date" />
      <a-date-picker v-model:value="range[1]" type="date" style="margin-left:8px" />
      <a-button type="primary" @click="load" style="margin-left:8px">查询</a-button>
      <a-button @click="exportData" style="margin-left:8px">导出</a-button>
    </a-col>
  </a-row>

  <a-card>
    <a-table :columns="columns" :data="rows" :pagination="{pageSize:10}"/>
  </a-card>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/arco-design/dist/arco-vue.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/arco-design/dist/arco.min.css" />
<script>
const { createApp } = Vue;
createApp({
  data(){ return { range:[null,null], rows:[], columns:[{title:'货品',dataIndex:'goods_name'},{title:'销售数量',dataIndex:'qty'},{title:'销售金额',dataIndex:'amt'},{title:'排名',dataIndex:'rank'}] } },
  mounted(){ this.load(); },
  methods:{
    load(){ const s=this.range[0]||''; const e=this.range[1]||''; fetch('/admin/report/data_by_goods?start='+s+'&end='+e).then(r=>r.json()).then(j=>{ if(j.code==200){ this.rows=j.data.map((r,i)=>Object.assign(r,{rank:i+1})); } }); },
    exportData(){ const s=this.range[0]||''; const e=this.range[1]||''; location.href='/admin/report/export/by_goods?start='+s+'&end='+e; }
  }
}).use(ArcoVue).mount('#byGoodsApp');
</script>

{/block}
