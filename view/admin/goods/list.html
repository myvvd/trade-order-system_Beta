{extend name="layout/admin_base"/}

{block name="content"}
<div id="goodsListApp">
    <div class="page-header">
        <div class="page-header-title">货品管理</div>
        <a-space :size="12">
            <a-button type="primary" @click="goCreate">+ 新增货品</a-button>
            <a-button @click="goCategoryManage">分类管理</a-button>
        </a-space>
    </div>

    <!-- 搜索区域 -->
    <a-card style="margin-bottom: 16px;">
        <a-form :model="searchForm" layout="inline">
            <a-form-item label="关键词">
                <a-input v-model="searchForm.keyword" placeholder="货品编号/名称" style="width: 200px;" allow-clear />
            </a-form-item>
            <a-form-item label="分类">
                <a-select v-model="searchForm.categoryId" placeholder="全部分类" style="width: 150px;" allow-clear>
                    <a-option :value="0">全部分类</a-option>
                    <a-option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.name }}</a-option>
                </a-select>
            </a-form-item>
            <a-form-item label="状态">
                <a-select v-model="searchForm.status" placeholder="全部状态" style="width: 120px;" allow-clear>
                    <a-option value="">全部</a-option>
                    <a-option value="1">上架</a-option>
                    <a-option value="0">下架</a-option>
                </a-select>
            </a-form-item>
            <a-form-item>
                <a-button type="primary" @click="handleSearch">搜索</a-button>
                <a-button @click="handleReset" style="margin-left: 8px;">重置</a-button>
            </a-form-item>
        </a-form>
    </a-card>

    <!-- 表格区域 -->
    <a-card>
        <a-table :data="tableData" :pagination="false" :bordered="{cell:true}" :stripe="true" row-key="id">
            <template #columns>
                <a-table-column title="货品编号" data-index="goods_no" :width="140" />
                <a-table-column title="货品名称" data-index="name" :width="200">
                    <template #cell="{ record }">
                        <a-link @click="viewDetail(record.id)">{{ record.name }}</a-link>
                    </template>
                </a-table-column>
                <a-table-column title="分类" :width="120">
                    <template #cell="{ record }">{{ getCategoryName(record.category_id) }}</template>
                </a-table-column>
                <a-table-column title="成本价" :width="100" align="right">
                    <template #cell="{ record }">¥{{ record.cost_price || 0 }}</template>
                </a-table-column>
                <a-table-column title="销售价" :width="100" align="right">
                    <template #cell="{ record }">¥{{ record.sale_price || 0 }}</template>
                </a-table-column>
                <a-table-column title="库存" data-index="stock_quantity" :width="80" align="center" />
                <a-table-column title="状态" :width="80" align="center">
                    <template #cell="{ record }">
                        <a-tag v-if="record.status == 1" color="green">上架</a-tag>
                        <a-tag v-else color="red">下架</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="操作" :width="220">
                    <template #cell="{ record }">
                        <a-space :size="8">
                            <a-button type="text" size="small" @click="editGoods(record.id)">编辑</a-button>
                            <a-button type="text" size="small" @click="viewDetail(record.id)">详情</a-button>
                            <a-button type="text" size="small" @click="viewSkus(record.id)">SKU</a-button>
                            <a-button type="text" size="small" @click="toggleStatus(record)">{{ record.status == 1 ? '下架' : '上架' }}</a-button>
                            <a-button type="text" status="danger" size="small" @click="deleteGoods(record)">删除</a-button>
                        </a-space>
                    </template>
                </a-table-column>
            </template>
        </a-table>

        <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #86909c;">共 {{ total }} 条记录</span>
            <a-pagination v-model:current="currentPage" v-model:page-size="pageSize" :total="total" @change="handlePageChange" />
        </div>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
// 从控制器传递的数据（使用ThinkPHP模板变量语法）
const __GOODS_LIST__ = {$goods_list_json|raw};
const __CATEGORIES__ = {$categories_json|raw};
const __TOTAL__ = {$goods_total};
const __CURRENT_PAGE__ = {$goods_current_page};
const __KEYWORD__ = '{$keyword|addslashes}';
const __CATEGORY_ID__ = {$categoryId};
const __STATUS__ = '{$status|addslashes}';

const { ref, reactive } = Vue;

window.createPageApp({
    setup() {
        const searchForm = reactive({
            keyword: __KEYWORD__,
            categoryId: __CATEGORY_ID__,
            status: __STATUS__
        });

        const tableData = ref(__GOODS_LIST__);
        const categories = ref(__CATEGORIES__);
        const total = ref(__TOTAL__);
        const currentPage = ref(__CURRENT_PAGE__);
        const pageSize = ref(15);

        const getCategoryName = (categoryId) => {
            const cat = categories.value.find(c => c.id == categoryId);
            return cat ? cat.name : '-';
        };

        const handleSearch = () => {
            const params = [];
            if (searchForm.keyword) params.push('keyword=' + encodeURIComponent(searchForm.keyword));
            if (searchForm.categoryId) params.push('category_id=' + searchForm.categoryId);
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            let url = '/admin/goods/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const handleReset = () => {
            searchForm.keyword = '';
            searchForm.categoryId = 0;
            searchForm.status = '';
            handleSearch();
        };

        const handlePageChange = (page) => {
            const params = [];
            if (searchForm.keyword) params.push('keyword=' + encodeURIComponent(searchForm.keyword));
            if (searchForm.categoryId) params.push('category_id=' + searchForm.categoryId);
            if (searchForm.status !== '') params.push('status=' + searchForm.status);
            params.push('page=' + page);
            let url = '/admin/goods/list';
            if (params.length) url += '?' + params.join('&');
            location.href = url;
        };

        const goCreate = () => { location.href = '/admin/goods/create'; };
        const goCategoryManage = () => { location.href = '/admin/goods_category/list'; };
        const editGoods = (id) => { location.href = '/admin/goods/edit/' + id; };
        const viewDetail = (id) => { location.href = '/admin/goods/detail/' + id; };

        const viewSkus = (goodsId) => {
            fetch('/admin/goods/skuList/' + goodsId)
                .then(res => res.json())
                .then(result => {
                    if ((result.success || result.code == 1) && result.data && result.data.length > 0) {
                        const skuListHtml = result.data.map(sku =>
                            '<tr style="border-bottom: 1px solid #f0f0f0;">' +
                            '<td style="padding: 10px;">' + sku.sku_no + '</td>' +
                            '<td style="padding: 10px;">' + (sku.sku_name || '-') + '</td>' +
                            '<td style="padding: 10px;">¥' + sku.cost_price + '</td>' +
                            '<td style="padding: 10px;">¥' + sku.sale_price + '</td>' +
                            '<td style="padding: 10px;">' + (sku.stock_quantity || 0) + '</td>' +
                            '</tr>'
                        ).join('');
                        ArcoModal.info({
                            title: 'SKU列表',
                            content: '<table style="width:100%;border-collapse:collapse;">' +
                                '<thead><tr style="background:#f5f5f5;">' +
                                '<th style="padding:8px;">SKU编号</th>' +
                                '<th style="padding:8px;">规格名称</th>' +
                                '<th style="padding:8px;">成本价</th>' +
                                '<th style="padding:8px;">销售价</th>' +
                                '<th style="padding:8px;">库存</th>' +
                                '</tr></thead>' +
                                '<tbody>' + skuListHtml + '</tbody></table>',
                            width: 600,
                            okText: '关闭'
                        });
                    } else {
                        ArcoMessage.info('暂无SKU数据');
                    }
                });
        };

        const toggleStatus = (record) => {
            const action = record.status == 1 ? '下架' : '上架';
            ArcoModal.confirm({
                title: '提示',
                content: '确定要' + action + '此货品吗？',
                onOk: () => {
                    fetch('/admin/goods/toggleStatus', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'id=' + record.id
                    }).then(res => res.json()).then(result => {
                        if (result.success || result.code == 1) {
                            ArcoMessage.success(result.msg || '操作成功');
                            location.reload();
                        } else {
                            ArcoMessage.error(result.msg || '操作失败');
                        }
                    });
                }
            });
        };

        const deleteGoods = (record) => {
            ArcoModal.confirm({
                title: '提示',
                content: '确定要删除此货品吗？',
                onOk: () => {
                    fetch('/admin/goods/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'id=' + record.id
                    }).then(res => res.json()).then(result => {
                        if (result.success || result.code == 1) {
                            ArcoMessage.success('删除成功');
                            location.reload();
                        } else {
                            ArcoMessage.error(result.msg || '删除失败');
                        }
                    });
                }
            });
        };

        return {
            searchForm,
            tableData,
            categories,
            total,
            currentPage,
            pageSize,
            getCategoryName,
            handleSearch,
            handleReset,
            handlePageChange,
            goCreate,
            goCategoryManage,
            editGoods,
            viewDetail,
            viewSkus,
            toggleStatus,
            deleteGoods
        };
    }
}, 'goodsListApp');
</script>
{/block}
