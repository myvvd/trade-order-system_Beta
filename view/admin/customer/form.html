{extend name="layout/admin_base"/}

{block name="content"}
<h1 class="page-title">{$title}</h1>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form id="customerForm" onsubmit="return saveCustomer(event)">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">公司名称 <span style="color: #f53f3f;">*</span></label>
            <input type="text" name="company_name" value="{$customer.company_name|default=''}" placeholder="请输入公司名称" required
                style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">国家 <span style="color: #f53f3f;">*</span></label>
            <select name="country" required
                style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box; background: #fff;">
                <option value="">请选择国家</option>
                {volist name="countries" id="c"}
                <option value="{$c}" {if condition="($customer['country'] ?? '') eq $c"}selected{/if}>{$c}</option>
                {/volist}
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">联系人 <span style="color: #f53f3f;">*</span></label>
            <input type="text" name="contact_name" value="{$customer.contact_name|default=''}" placeholder="请输入联系人姓名" required
                style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">电话</label>
            <input type="text" name="phone" value="{$customer.phone|default=''}" placeholder="请输入联系电话"
                style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">邮箱</label>
            <input type="email" name="email" value="{$customer.email|default=''}" placeholder="请输入邮箱地址"
                style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">地址</label>
            <textarea name="address" placeholder="请输入详细地址"
                style="width: 100%; height: 80px; padding: 12px; border: 1px solid #e5e6eb; border-radius: 4px; resize: vertical; box-sizing: border-box;">{$customer.address|default=''}</textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">采购方等级</label>
            <select name="level"
                style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #e5e6eb; border-radius: 4px; box-sizing: border-box; background: #fff;">
                <option value="1" {if condition="($customer['level'] ?? 1) eq 1"}selected{/if}>普通</option>
                <option value="2" {if condition="($customer['level'] ?? 1) eq 2"}selected{/if}>VIP</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">状态</label>
            <label style="margin-right: 16px;">
                <input type="radio" name="status" value="1" {if condition="($customer['status'] ?? 1) eq 1"}checked{/if}> 正常
            </label>
            <label>
                <input type="radio" name="status" value="0" {if condition="($customer['status'] ?? 1) eq 0"}checked{/if}> 禁用
            </label>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">备注</label>
            <textarea name="remark" placeholder="请输入备注信息"
                style="width: 100%; height: 80px; padding: 12px; border: 1px solid #e5e6eb; border-radius: 4px; resize: vertical; box-sizing: border-box;">{$customer.remark|default=''}</textarea>
        </div>

        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            <button type="button" class="btn btn-default" onclick="history.back()" style="flex: 1;">返回</button>
        </div>

        {if condition="!empty($customer['id'])"}
        <input type="hidden" name="id" value="{$customer.id}">
        {/if}
    </form>
</div>
{/block}

{block name="script"}
<script>
function saveCustomer(event) {
    event.preventDefault();

    const form = document.getElementById('customerForm');
    const formData = new FormData(form);

    // 根据是否有ID决定是新增还是编辑
    const customerId = formData.get('id');
    const url = customerId ? '/admin/customer/update?id=' + customerId : '/admin/customer/save';

    fetch(url, {
        method: 'POST',
        body: formData
    }).then(res => res.json()).then(result => {
        if (result.success || result.code === 200 || result.code === 1) {
            alert(result.msg || '保存成功');
            location.href = '/admin/customer/list';
        } else {
            alert(result.msg || '保存失败');
        }
    }).catch(err => {
        console.error('请求出错:', err);
        alert('网络请求失败');
    });
}
</script>
{/block}
