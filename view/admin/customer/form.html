{extend name="layout/admin_base"/}
{php}
$customer = isset($customer) ? ($customer instanceof \think\Model ? $customer->toArray() : $customer) : null;
$countries = $countries ?? [];
{/php}

{block name="content"}
<div class="page-header">
    <div class="page-header-title">{$title}</div>
</div>

<a-card>
    <a-form id="customerForm">
        <a-form-item label="公司名称">
            <a-input v-model:value="form.company_name" placeholder="公司名称" />
        </a-form-item>

        <a-form-item label="国家">
            <a-select v-model:value="form.country" placeholder="请选择国家">
                <a-option v-for="c in countries" :key="c" :value="c">{{ c }}</a-option>
            </a-select>
        </a-form-item>

        <a-form-item label="联系人">
            <a-input v-model:value="form.contact_name" />
        </a-form-item>

        <a-form-item label="电话">
            <a-input v-model:value="form.phone" />
        </a-form-item>

        <a-form-item label="邮箱">
            <a-input v-model:value="form.email" />
        </a-form-item>

        <a-form-item label="地址">
            <a-input v-model:value="form.address" />
        </a-form-item>

        <a-form-item label="客户等级">
            <a-select v-model:value="form.level">
                <a-option :value="1">普通</a-option>
                <a-option :value="2">VIP</a-option>
            </a-select>
        </a-form-item>

        <a-form-item label="备注">
            <a-input v-model:value="form.remark" />
        </a-form-item>

        <a-form-item>
            <a-button type="primary" @click="handleSubmit">保存</a-button>
            <a-button @click="handleCancel">取消</a-button>
        </a-form-item>
    </a-form>
</a-card>

{/block}

{block name="script"}
<script>
const { createApp, reactive } = Vue;
const app = createApp({
    setup() {
        const form = reactive({
            id: '{$customer.id|raw}',
            company_name: '{$customer.company_name|raw}',
            country: '{$customer.country|raw}',
            contact_name: '{$customer.contact_name|raw}',
            phone: '{$customer.phone|raw}',
            email: '{$customer.email|raw}',
            address: '{$customer.address|raw}',
            level: {$customer.level|raw|default=1},
            remark: '{$customer.remark|raw}',
            status: {$customer.status|raw|default=1}
        });

        const countries = {$countries_json|raw|json_encode|default='[]'};

        const handleSubmit = () => {
            const url = form.id ? '/admin/customer/update/' + form.id : '/admin/customer/save';
            const body = new URLSearchParams();
            for (const k in form) body.append(k, form[k]);
            fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() })
                .then(r => r.json()).then(ret => {
                    if (ret.success) { ArcoMessage.success(ret.msg || '保存成功'); location.href = '/admin/customer/list'; }
                    else { ArcoMessage.error(ret.msg || '保存失败'); }
                });
        };

        const handleCancel = () => { history.back(); };

        return { form, countries, handleSubmit, handleCancel };
    }
});

const container = document.createElement('div');
document.getElementById('app')?.appendChild(container);
app.mount(container);
</script>
{/block}
