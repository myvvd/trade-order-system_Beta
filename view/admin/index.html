{extend name="layout/admin_base"/}

{block name="content"}
<h1 class="page-title">仪表盘</h1>

<div class="card">
    <h2>欢迎回来，{$username|default='管理员'}！</h2>
    <p style="margin-top: 16px; color: #86909c;">这里是外贸订单管理系统首页。</p>
</div>

<div style="display: flex; gap: 20px; margin-bottom: 20px;">
    <div style="flex: 1; background: linear-gradient(135deg, #165DFF 0%, #4E7CFF 100%); border-radius: 8px; padding: 24px; color: #fff;">
        <div style="font-size: 14px; opacity: 0.9;">待处理订单</div>
        <div style="font-size: 32px; font-weight: bold; margin-top: 8px;">12</div>
    </div>
    <div style="flex: 1; background: linear-gradient(135deg, #00b42a 0%, #00d277 100%); border-radius: 8px; padding: 24px; color: #fff;">
        <div style="font-size: 14px; opacity: 0.9;">今日完成</div>
        <div style="font-size: 32px; font-weight: bold; margin-top: 8px;">5</div>
    </div>
    <div style="flex: 1; background: linear-gradient(135deg, #ff7d00 0%, #ff9500 100%); border-radius: 8px; padding: 24px; color: #fff;">
        <div style="font-size: 14px; opacity: 0.9;">待收货</div>
        <div style="font-size: 32px; font-weight: bold; margin-top: 8px;">3</div>
    </div>
    <div style="flex: 1; background: linear-gradient(135deg, #f53f3f 0%, #ff7d7d 100%); border-radius: 8px; padding: 24px; color: #fff;">
        <div style="font-size: 14px; opacity: 0.9;">已取消</div>
        <div style="font-size: 32px; font-weight: bold; margin-top: 8px;">1</div>
    </div>
</div>

<div class="card">
    <h3 style="margin-bottom: 16px;">快捷操作</h3>
    <div style="display: flex; gap: 12px;">
        <button class="btn btn-primary">创建订单</button>
        <button class="btn btn-default">采购方管理</button>
        <button class="btn btn-default">供应商管理</button>
    </div>
</div>
{/block}

{block name="script"}
<script>
console.log('管理端首页加载完成');
</script>
{/block}
