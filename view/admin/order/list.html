{extend name="layout/admin_base"}

{block name="content"}
<div id="orderListApp" v-cloak>
    <div class="page-header">
        <div class="page-header-title">订单管理</div>
        <a-space>
            <a-button type="primary" @click="goCreate">
                <template #icon><icon-plus /></template>
                新建订单
            </a-button>
            {if condition="$isSuper"}
            <a-button @click="initTestData">初始化测试数据</a-button>
            {/if}
        </a-space>
    </div>

    <a-card class="query-card" :bordered="false" style="margin-bottom: 16px;">
        <a-form :model="searchForm" layout="inline" @submit="handleSearch">
            <a-form-item label="关键词">
                <a-input v-model="searchForm.keyword" placeholder="订单号/客户/备注" allow-clear />
            </a-form-item>
            <a-form-item label="日期范围">
                <a-range-picker v-model="dateRange" @change="handleDateChange" />
            </a-form-item>
            <a-form-item>
                <a-space>
                    <a-button type="primary" html-type="submit">搜索</a-button>
                    <a-button @click="handleReset">重置</a-button>
                </a-space>
            </a-form-item>
        </a-form>
    </a-card>

    <a-card class="list-card" :bordered="false">
        <a-tabs v-model:active-key="activeStatus" @change="handleTabChange">
            <!-- 遍历 PHP 的 tabs 数组生成标签页 -->
            {foreach name="tabs" item="label" key="k"}
            <a-tab-pane key="{$k}" title="{$label}"></a-tab-pane>
            {/foreach}
        </a-tabs>

        <a-table 
            :data="tableData" 
            :pagination="pagination" 
            :loading="loading"
            @page-change="onPageChange"
            row-key="id"
            :bordered="{cell:true}"
            stripe
            style="margin-top: 16px;"
        >
            <template #columns>
                <a-table-column title="订单号" data-index="order_no" :width="180">
                     <template #cell="{ record }">
                        <a-link @click="goDetail(record.id)">{{ record.order_no }}</a-link>
                    </template>
                </a-table-column>
                <a-table-column title="客户" data-index="customer_name" :width="200"></a-table-column>
                <a-table-column title="总金额" data-index="total_amount" :width="120" align="right">
                    <template #cell="{ record }">
                        ¥{{ record.total_amount }}
                    </template>
                </a-table-column>
                <a-table-column title="状态" data-index="status_text" :width="100" align="center">
                    <template #cell="{ record }">
                        <a-tag :color="getStatusColor(record.status)">{{ record.status_text }}</a-tag>
                    </template>
                </a-table-column>
                <a-table-column title="创建时间" data-index="create_time" :width="180"></a-table-column>
                <a-table-column title="操作" :width="220">
                    <template #cell="{ record }">
                        <a-space>
                            <a-button type="text" size="small" @click="goDetail(record.id)">详情</a-button>
                            <a-button 
                                v-if="record.status == 10" 
                                type="text" 
                                size="small" 
                                @click="goEdit(record.id)"
                            >编辑</a-button>
                            <a-popconfirm v-if="record.status == 10" content="确定要删除吗？" @ok="deleteOrder(record.id)">
                                <a-button type="text" status="danger" size="small">删除</a-button>
                            </a-popconfirm>
                             <a-popconfirm v-if="canCancel(record.status)" content="确定要取消吗？" @ok="cancelOrder(record.id)">
                                <a-button type="text" status="warning" size="small">取消</a-button>
                            </a-popconfirm>
                        </a-space>
                    </template>
                </a-table-column>
            </template>
        </a-table>
    </a-card>
</div>
{/block}

{block name="script"}
<script>
window.createPageApp({
    setup() {
        const { ref, reactive, onMounted } = Vue;
        const ArcoMessage = Arco.Message;

        // PHP 数据注入
        const rawOrders = <?php 
            $data = [];
            foreach($orders as $item){
                $arr = $item->toArray();
                $arr['status_text'] = $item->status_text;
                $arr['customer_name'] = $item->customer ? $item->customer->company_name : '-';
                $data[] = $arr;
            }
            echo json_encode($data, JSON_UNESCAPED_UNICODE); 
        ?>;
        
        const total = <?php echo $orders->total(); ?>;
        const currentPage = <?php echo $orders->currentPage(); ?>;
        const pageSize = <?php echo $orders->listRows(); ?>;
        
        const searchForm = reactive({
            keyword: '{$keyword}',
            status: '{$status}',
        });
        
        const dateRange = ref([
            '{$date_from}',
            '{$date_to}'
        ]);

        const activeStatus = ref('{$status}');
        const tableData = ref(rawOrders);
        const loading = ref(false);

        const pagination = reactive({
            total: total,
            current: currentPage,
            pageSize: pageSize,
            showTotal: true,
            showPageSize: false
        });

        const getStatusColor = (status) => {
             const map = {
                10: 'arcoblue', // 待派单
                20: 'orange', // 待确认
                21: 'red', // 已拒绝
                30: 'cyan', // 制作中
                40: 'purple', // 待收货
                50: 'green', // 已入库
                60: 'gold', // 已发货
                70: 'green', // 已完成
                99: 'gray' // 已取消
            };
            return map[status] || '';
        };

        const canCancel = (status) => {
             return status < 70 && status != 99;
        };

        const handleSearch = () => {
            const params = new URLSearchParams();
            if(searchForm.keyword) params.append('keyword', searchForm.keyword);
            if(activeStatus.value) params.append('status', activeStatus.value);
            if(dateRange.value && dateRange.value[0]) {
                params.append('date_from', dateRange.value[0]);
            }
            if(dateRange.value && dateRange.value[1]) {
                params.append('date_to', dateRange.value[1]);
            }
            location.href = '?' + params.toString();
        };

        const handleReset = () => {
            location.href = '/admin/order';
        };

        const handleTabChange = (val) => {
             handleSearch();
        };
        
        const handleDateChange = (val) => {
            // val is array [start, end]
        };

        const onPageChange = (page) => {
             const params = new URLSearchParams(window.location.search);
             params.set('page', page);
             location.href = '?' + params.toString();
        };

        const goCreate = () => location.href = '/admin/order/create';
        const goDetail = (id) => location.href = '/admin/order/detail/' + id;
        const goEdit = (id) => location.href = '/admin/order/edit/' + id;

        const deleteOrder = async (id) => {
             try {
                const res = await fetch('/admin/order/delete/' + id, { method: 'POST' });
                const json = await res.json();
                if(json.code == 1) {
                    ArcoMessage.success('删除成功');
                    location.reload();
                } else {
                    ArcoMessage.error(json.msg || '删除失败');
                }
             } catch(e) {
                 ArcoMessage.error(e.message);
             }
        };

        const cancelOrder = async (id) => {
             try {
                const res = await fetch('/admin/order/cancel/' + id, { method: 'POST' });
                const json = await res.json();
                if(json.code == 1) {
                    ArcoMessage.success('取消成功');
                    location.reload();
                } else {
                    ArcoMessage.error(json.msg || '取消失败');
                }
             } catch(e) {
                 ArcoMessage.error(e.message);
             }
        };

        const initTestData = async () => {
              try {
                if(!confirm('确定要初始化测试数据吗？这将删除现有测试数据。')) return;
                const res = await fetch('/admin/order/initTestData', { method: 'POST' });
                const json = await res.json();
                if(json.code == 1) {
                    ArcoMessage.success(json.msg);
                    setTimeout(()=>location.reload(), 1000);
                } else {
                    ArcoMessage.error(json.msg || '操作失败');
                }
             } catch(e) {
                 ArcoMessage.error(e.message);
             }
        };

        return {
            searchForm,
            dateRange,
            activeStatus,
            tableData,
            loading,
            pagination,
            getStatusColor,
            canCancel,
            handleSearch,
            handleReset,
            handleTabChange,
            handleDateChange,
            onPageChange,
            goCreate,
            goDetail,
            goEdit,
            deleteOrder,
            cancelOrder,
            initTestData
        };
    }
}, 'orderListApp');
</script>
{/block}
